<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B4332" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Standard icons -->

    <!-- iOS splash screens (apple-touch-startup-image) -->

    <link rel="apple-touch-startup-image" href="/apple-splash-750-1334.png"

    <link rel="apple-touch-startup-image" href="/apple-splash-1125-2436.png"

    <!-- iPhone 12 / 13 / 14: 390×844 @3x -->
    <link rel="apple-touch-startup-image" href="/apple-splash-1170-2532.png"

    <link rel="apple-touch-startup-image" href="/apple-splash-1284-2778.png"

    <link rel="apple-touch-startup-image" href="/apple-splash-2048-2732.png"
